version: 3

tasks:
  install:
    desc: Install dependencies
    cmds:
      - go install github.com/apigear-io/cli/cmd/apigear@latest
  gm_clean:
    desc: Clean up goldenmaster
    dir: goldenmaster
    cmds:
      - rm -rf goldenmaster
  clean:
    desc: Clean up
    cmds:
      - rm -rf test
  run:
    desc: Run code generation
    deps:
      - clean
    cmds:
      - apigear g s ./apigear/goldenmaster.solution.yaml --force
      - task: test_validate
  gm_validate:
    desc: Validate code generation
    dir: goldenmaster
    cmds:
      - go mod tidy
      - goimports -w .
      - go fmt ./...
      - golangci-lint run
  test_validate:
    desc: Validate code generation
    dir: test
    cmds:
      - go mod tidy
      - goimports -w .
      - go fmt ./...
      - golangci-lint run
  test:
    desc: Run tests
    cmds:
      - apigear g s ./apigear/goldenmaster.solution.yaml
      - git --no-pager diff --no-index --exit-code goldenmaster test
  server:gen:
    desc: Run server
    cmds:
      - apigear g s ./apigear/testbed.server.solution.yaml
  server:fmt:
    desc: Format server
    dir: examples/testbed
    cmds:
      - goimports -w .
  server:run:
    desc: Run server
    dir: test/tb_server
    cmds:
      - go run cmd/server/main.go
  update:
    desc: Update dependencies
    cmds:
      - git submodule update --remote test-apis
