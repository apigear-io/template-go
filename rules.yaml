languages: ["go"]
features:
  - name: api
    scopes:
      - match: module
        prefix: "{{snake .Module.Name}}/"
        documents:
          - source: "api/api.go.tpl"
            target: "api.go"
          - source: "api/as.go.tpl"
            target: "as.go"
  - name: scaffold
    scopes:
      - match: system
        documents:
          - source: "go.mod.tpl"
            target: "go.mod"
          - source: Makefile.tpl
            target: Makefile
      - match: interface
        prefix: "{{snake .Module.Name}}/"
        documents:
          - source: "scaffold/impl.go.tpl"
            target: "{{snake .Interface.Name}}.go"
  # - name: http
