  - name: olink
    # requires:
    #   - api
    scopes:
      - match: system
        documents:
          - source: "olink/server.go.tpl"
            target: "examples/olink_server/main.go"
          - source: "olink/client.go.tpl"
            target: "examples/olink_client/main.go"
      - match: interface
        prefix: "{{snake .Module.Name}}/"
        documents:
          - source: "olink/sink.go.tpl"
            target: "{{snake .Interface.Name}}_olink_sink.go"
          - source: "olink/source.go.tpl"
            target: "{{snake .Interface.Name}}_olink_source.go"
